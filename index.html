<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuwait War Alert Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
            color: #00b894;
        }

        .counter {
            background-color: #1e272e;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            font-size: 1.2em;
        }

        .alert-counter {
            background-color: #ff3b3b;
        }

        ul#alerts {
            list-style-type: none;
            padding-left: 0;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 10px;
            background-color: #1e272e;
        }

        ul#alerts li {
            margin: 5px 0;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>🇰🇼 Kuwait War Alert Dashboard</h1>

    <h2>Today</h2>
    <div class="counter">
        🚀 Missiles Today: <span id="missilesToday">0</span>
    </div>
    <div class="counter">
        🛸 Drones Today: <span id="dronesToday">0</span>
    </div>
    <div class="counter">
        🔊 Sirens Today: <span id="sirensToday">0</span>
    </div>

    <h2>Since War Started</h2>
    <div class="counter alert-counter">
        🚀 Missiles Total: <span id="missilesTotal">0</span>
    </div>
    <div class="counter alert-counter">
        🛸 Drones Total: <span id="dronesTotal">0</span>
    </div>
    <div class="counter alert-counter">
        🔊 Sirens Total: <span id="sirensTotal">0</span>
    </div>

    <h2>Recent Alerts</h2>
    <ul id="alerts"></ul>

    <!-- Link to your JS file -->
    <script src="script.js"></script>

    <footer>
        Data powered by RSS feeds and Supabase | Auto-updates every minute
    </footer>

</body>
</html>
